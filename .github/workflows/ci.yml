# CI（D3 拍板，2026-07-06）：push/PR 触发单测 + Debug 构建，防"只在本机绿"。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Windows 开发机提交的 gradlew 可能没有可执行位
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Shared unit tests (commonTest via jvmTest)
        run: ./gradlew :shared:jvmTest --console=plain

      - name: App unit tests + assemble debug
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug --console=plain

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            shared/build/reports/tests/
            app/build/reports/tests/
