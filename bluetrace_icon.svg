<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>BlueTrace App Icon</title>
  <desc>Bluetooth BLE data capture icon with signal trace, data dots and telemetry bars.</desc>

  <defs>
    <linearGradient id="bg" x1="180" y1="64" x2="836" y2="964" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#006BFF"/>
      <stop offset="0.42" stop-color="#0046C8"/>
      <stop offset="1" stop-color="#061B5C"/>
    </linearGradient>

    <linearGradient id="cyanStroke" x1="208" y1="260" x2="830" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18A7FF"/>
      <stop offset="0.52" stop-color="#2FE9FF"/>
      <stop offset="1" stop-color="#0B75FF"/>
    </linearGradient>

    <linearGradient id="dotGrad" x1="95" y1="493" x2="390" y2="493" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B8BFF"/>
      <stop offset="1" stop-color="#7FFFFF"/>
    </linearGradient>

    <linearGradient id="btGrad" x1="512" y1="270" x2="512" y2="738" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.62" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#D7F4FF"/>
    </linearGradient>

    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#001B64" flood-opacity="0.38"/>
    </filter>

    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.02
                0 0 0 0 0.78
                0 0 0 0 1
                0 0 0 0.65 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <!-- Android rounded-square background -->
  <rect x="56" y="56" width="912" height="912" rx="214" fill="url(#bg)"/>

  <!-- subtle highlight -->
  <ellipse cx="502" cy="300" rx="350" ry="285" fill="#1A8BFF" opacity="0.12"/>
  <ellipse cx="824" cy="708" rx="230" ry="210" fill="#00D4FF" opacity="0.08"/>

  <!-- circular BLE acquisition ring -->
  <g filter="url(#glow)">
    <path d="M220 421C258 255 405 166 553 184C672 198 763 270 806 382"
          stroke="url(#cyanStroke)" stroke-width="31" stroke-linecap="round"/>
    <path d="M802 648C742 789 595 856 447 825C333 801 251 726 220 607"
          stroke="url(#cyanStroke)" stroke-width="31" stroke-linecap="round"/>
  </g>

  <!-- incoming data dots -->
  <g fill="url(#dotGrad)" filter="url(#glow)">
    <circle cx="110" cy="493" r="12"/>
    <circle cx="160" cy="493" r="14"/>
    <circle cx="217" cy="493" r="17"/>
    <circle cx="278" cy="493" r="20"/>
    <circle cx="350" cy="493" r="23"/>
  </g>

  <!-- signal waveform -->
  <g filter="url(#glow)">
    <path d="M573 493H620C636 493 633 467 651 467C671 467 660 526 689 526C718 526 720 364 741 364C761 364 754 626 789 626C821 626 823 419 843 419C864 419 858 528 887 528C912 528 906 473 930 473C947 473 946 494 963 494H978"
          stroke="#67F6FF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="978" cy="494" r="23" fill="#7FFFFF"/>
  </g>

  <!-- telemetry bars -->
  <g filter="url(#glow)" stroke-linecap="round">
    <path d="M354 770V724" stroke="#00B7FF" stroke-width="18"/>
    <path d="M383 782V682" stroke="#1DE9FF" stroke-width="18"/>
    <path d="M412 795V645" stroke="#24DFFF" stroke-width="18"/>
    <path d="M441 798V690" stroke="#1DD8FF" stroke-width="18"/>
    <path d="M470 810V722" stroke="#0AC7FF" stroke-width="18"/>
    <path d="M499 819V762" stroke="#19E2FF" stroke-width="18"/>
    <path d="M528 819V782" stroke="#59FFFF" stroke-width="18"/>
    <path d="M557 810V762" stroke="#25E6FF" stroke-width="18"/>
    <path d="M586 798V722" stroke="#11CFFF" stroke-width="18"/>
    <path d="M615 790V690" stroke="#22E3FF" stroke-width="18"/>
    <path d="M644 778V645" stroke="#32F3FF" stroke-width="18"/>
    <path d="M673 770V690" stroke="#18D8FF" stroke-width="18"/>
  </g>

  <!-- Bluetooth symbol, constructed as vector paths -->
  <g filter="url(#softShadow)">
    <path d="M499 274C499 258 518 250 530 261L645 376C655 386 655 403 645 413L544 514L645 615C655 625 655 642 645 652L530 767C518 778 499 770 499 754V570L413 656C402 667 385 667 374 656C363 645 363 628 374 617L479 512L374 407C363 396 363 379 374 368C385 357 402 357 413 368L499 454V274ZM552 343V455L608 399L552 343ZM552 569V685L610 627L552 569Z"
          fill="url(#btGrad)"/>
  </g>

  <!-- small rim reflections -->
  <path d="M253 356C306 259 408 211 508 214" stroke="#80F6FF" stroke-width="7" stroke-linecap="round" opacity="0.32"/>
  <path d="M713 759C654 806 577 831 497 819" stroke="#69F4FF" stroke-width="7" stroke-linecap="round" opacity="0.22"/>
</svg>
