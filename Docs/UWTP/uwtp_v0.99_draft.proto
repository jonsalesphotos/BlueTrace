// UWTP V0.99-r2 —— 控制/协商 payload schema 草案(与 UWTP_BLE_Protocol_Design_V0.99.md 配套)
//
// 范围: 使用 Protobuf 的 payload。固定二进制不在本文件:
//   TIME SET/GET(8B: u32 sec + u16 ms + s16 tz_min; 仅校时用, 时间戳只属于在线数据, D-2/D-3)
//   FILE/OTA 的 DATA([tid u8][offset u32][data]) 与 ACK([tid u8][next_offset u32][status u8])
//   REPORT_TLV 外层容器(8B bundle 头 + 6B record 头: algo_id u8 + rel_ms u24 LE + flags + len)
//   LOG LIVE_EVENT / TUNNEL(不透明; UWTP 不为 TUNNEL 提供可靠性)
// 约定: 响应消息首字段恒 uint32 status = 1 (0=OK, 缺省不编码)。
// 静态注册表制(D-12): main/sub/kind/algo_id/tunnel_id 硬编码于设计稿 §20;
//   HELLO 以 profile_id + registry_hash 做同表一致性校验, 不一致仅 CTRL 可用。
// transfer_id 规则(D-17): u8; 0 无效; 1-255 回绕; 设备 READY 生成; 断连/END/ABORT 作废。
// 校验算法(D-18): 文件 = CRC-32/IEEE 802.3; OTA image_hash = SHA-256(32B)。
// 状态: V0.99-r2 (V1.0 RC 候选); 冻结后只增不改 tag, 删字段用 reserved。

syntax = "proto3";

package uwtp.v1;

option java_package = "io.bluetrace.protocol.uwtp.v1";

// ============ 通用 ============

message CommonRsp { uint32 status = 1; }

// ============ CTRL / SESSION (0x01/0x01) ============

message Hello {                      // App -> 表, NEED_RSP=1
  uint32 protocol_version = 1;      // 本文档冻结 = 1
  string app_version      = 2;
  string profile_id       = 3;      // 注册表 §20.0, 如 "s7-collect"
  uint32 registry_hash    = 4;      // 静态注册表一致性校验; 当前 0x69E89954
}

message HelloRsp {
  uint32 status           = 1;      // protocol_version/registry_hash 不一致 -> UNSUPPORTED_SCHEMA(0x0E)
  uint32 protocol_version = 2;
  string firmware_version = 3;
  string device_sn        = 4;
  string profile_id       = 5;
  uint32 registry_hash    = 6;
}

message Bye {}                       // 可选

// ============ CTRL / USER_PROFILE (0x01/0x09) ============
// 写: 带字段发送; 读: 空 payload + NEED_RSP -> UserProfileRsp

message UserProfile {
  uint32 height_cm     = 1;
  uint32 weight_kg_x10 = 2;          // 70.5kg = 705
  uint32 sex           = 3;          // 0 未知 1 男 2 女
  uint32 birth_year    = 4;
  uint32 birth_month   = 5;
  uint32 birth_day     = 6;
  uint32 wear_hand     = 7;          // 0 未知 1 左 2 右
}

message UserProfileRsp { uint32 status = 1; UserProfile profile = 2; }

// ============ CTRL / ALGO_CTRL (0x01/0x04) ============

message AlgoReportCtrl {             // 只控制"结果上传", 断连自动全关
  repeated uint32 enable_ids = 1 [packed = true];  // algo_id 静态注册表 §20.3; 空=全关
  uint32 min_interval_ms     = 2;                  // 0 = 按算法原生速率
}

message AlgoReportCtrlRsp { uint32 status = 1; repeated uint32 active_ids = 2 [packed = true]; }

// ============ CTRL / STORAGE (0x01/0x07) ============

message StorageInfoReq {}

message StorageInfo {
  uint32 status      = 1;
  uint64 total_bytes = 2;
  uint64 used_bytes  = 3;
  uint32 file_count  = 4;
}

// ============ ALGO / REPORT_TLV 内层 value 示例 schema (0x02/0x02) ============
// 外层容器固定二进制; 异常解析规则见设计稿 §13.2

message HrResultV1   { uint32 hr_bpm = 1; uint32 confidence = 2; uint32 quality = 3; }

message Spo2ResultV1 {
  uint32 spo2        = 1;
  uint32 hr_bpm      = 2;
  uint32 quality     = 3;
  uint32 state_flags = 4;
  uint32 pi_x1000    = 5;
}

message WearResultV1 { uint32 wear_state = 1; uint32 confidence = 2; uint32 reason_flags = 3; }

// ============ OTA 域 (0x04) —— 语义对齐 MCUmgr/SMP img_mgmt ============

message OtaImgListReq {}             // 0x01, NEED_RSP=1

message OtaImgListRsp {
  uint32 status = 1;
  repeated OtaSlot slots = 2;
}

message OtaSlot {
  uint32 slot        = 1;
  string version     = 2;
  uint32 state_flags = 3;            // bit0 BOOTABLE bit1 PENDING bit2 CONFIRMED bit3 ACTIVE bit4 PERMANENT
}

message OtaUploadBegin {             // 0x02, NEED_RSP=1; App 提议, 设备定版
  uint32 image_size       = 1;
  bytes  image_hash       = 2;       // SHA-256, 32B (D-18)
  string version          = 3;
  uint32 target_slot      = 4;
  uint32 preferred_chunk  = 5;
  uint32 preferred_window = 6;
}

message OtaUploadReady {             // 0x03
  uint32 status              = 1;
  uint32 transfer_id         = 2;    // u8 域: 0 无效, 断连/END/ABORT 作废 (D-17)
  uint32 chunk_bytes         = 3;
  uint32 window_chunks       = 4;
  uint32 next_offset         = 5;    // 全新=0; 断连重来=flash 水位(同 image_hash 才续)
  uint32 max_in_flight_chunks = 6;   // WriteNoRsp 节流: App 小批发送上限 (D-16)
  uint32 inter_chunk_delay_us = 7;   // 0 = 仅按平台写回调节流
}

// UPLOAD_DATA(0x04)/UPLOAD_ACK(0x05) 固定二进制, 见设计稿 §14.4; 窗口 ACK 超时 5s (D-15)

message OtaUploadEnd { uint32 transfer_id = 1; }   // 0x06, NEED_RSP=1 -> SHA-256 校验 -> CommonRsp

message OtaImgState {                // 0x07, NEED_RSP=1
  uint32 op   = 1;                   // 1 TEST / 2 CONFIRM
  uint32 slot = 2;
}

message OtaReset {}                  // 0x08
message OtaAbort { uint32 transfer_id = 1; }   // 0x09

// ============ FILE 域 (0x05) —— 纯文件搬运, 不解释内容/不带采样时间 (D-3a/D-8) ============

message FileListReq {                // 0x01, NEED_RSP=1
  uint32 kind      = 1;              // 0 不过滤 / 1 LOG / 4 OFFLINE_DATA (设计稿 §20.2)
  uint32 page      = 2;
  uint32 page_size = 3;
}

message FileListRsp {
  uint32 status = 1;
  uint32 total  = 2;
  uint32 page   = 3;
  repeated FileEntry entries = 4;
}

message FileEntry {                  // r2: 删除 mtime_sec —— 时间戳只属于在线数据;
  string name = 1;                   //     文件时间从文件名约定或文件头(UOF1)获取
  uint32 size = 2;
  uint32 kind = 3;
  uint32 flags = 4;                  // 保留位, V1 置 0
}

message ReadBegin {                  // 0x02, NEED_RSP=1; V1.0 不支持断点续传, 恒从 0 传 (D-6)
  string name             = 1;
  uint32 preferred_chunk  = 2;
  uint32 preferred_window = 3;
}

message ReadReady {                  // 0x03
  uint32 status        = 1;
  uint32 transfer_id   = 2;
  uint32 total_bytes   = 3;
  uint32 chunk_bytes   = 4;
  uint32 window_chunks = 5;
  uint32 file_crc32    = 6;          // CRC-32/IEEE 802.3 (poly 04C11DB7/init FFFFFFFF/refin·refout/xorout FFFFFFFF)
}

// READ_DATA(0x04)/READ_ACK(0x05) 固定二进制, 见设计稿 §15.3; 窗口 ACK 超时 5s (D-15)

message ReadEnd {                    // 0x06
  uint32 status      = 1;
  uint32 transfer_id = 2;
  uint32 sent_bytes  = 3;
}

message FileAbort { uint32 transfer_id = 1; }   // 0x07, 双向; 文件保留

message DeleteReq { string name = 1; }          // 0x08, NEED_RSP=1; 读传输中拒删(BUSY)
